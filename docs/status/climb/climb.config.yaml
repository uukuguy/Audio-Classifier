# climb adapter config — Audio-Classifier / FinVCup 2026 turn-taking
# climb.md (项目无关执行手册) 读这个文件决定项目特定行为。改这里不改 climb.md。

score_name: Macro-F1
score_direction: max
subscores: [c, na, t, i, bc]          # 5 类逐类 F1（提交 CSV 列名小写，顺序同 multi_targets）
push_mode: auto-docker-build           # 复赛端到端 (2026-06-24 用户校正): climb 构建镜像 → 本机端到端冒烟验证 → docker push (本地已login) → 登记pending+打印tag/url。用户只"提交url到官方后台", 官方自动评分, 用户贴回真分。climb不替用户点提交(§16)。
state_dir: docs/status/climb           # climb 状态根（git-tracked — 2026-05-30 从 .claude/climb 迁出，修 fresh clone 丢状态）
artifact_dir: tools/runs/climb         # climb 训练产物根（gitignored，per-cycle 时间戳子目录）
run_tag_marker: -climb-                # 提交工件/ckpt 文件名含此标记区分 climb vs 手动
paradigm_field: parent_paradigm        # 本项目 paradigm = 编码器/架构组合（非 RL 算法）

# auto-docker-build 提交约束 (复赛镜像端到端)
submit:
  cadence: 2/day                       # 复赛官方: 每组每天最多 2 次提交, 评测期截止 7/9 23:59
  registry: "finvcup-registry.cn-shanghai.cr.aliyuncs.com/finvcup/team26"
  build_cmd: "docker build --platform linux/amd64 -f Dockerfile.finals -t <registry>:<tag> ."
  push_cmd: "docker push <registry>:<tag>  (climb 执行, 本地已 docker login)"
  tag_rule: "每版换 tag (见作战图 tag 规范); 同 tag 不推不同镜像; 推前先本机端到端冒烟 + cp 源码留档"
  output: "/app/submit/submit.csv (官方评测挂私有测试集2 跑 run.sh 产)"
  rule: "climb 自主 构建+冒烟+push, 记 pending-lb + 打印 tag/url。用户决定何时提交url到后台(每天2次配额宝贵)+贴回真分。climb 不替用户点提交。本机端到端冒烟(data/test 1000段)代替初赛CV预估, 验配方正确+耗时<60min。"

# SOTA 锚点（排行榜，2026-05-27）
sota:
  best_online: null                    # 我们自己还没提交过；榜首 0.747489
  leaderboard: { top1: 0.747489, top3: 0.73568, top10: 0.719176 }
  goal: "前3 ≥0.7357 / 保底前10 ≥0.7192"

# calibration 语义：gap = 公榜 Macro-F1 − 本地 OOF CV Macro-F1
calibration_note: "本地 CV 用按会话划分 + 30s 切片化验证集（防滑窗乐观偏差）。gap 校准 CV→公榜。"

# 资源
resources:
  dev: "MBP M3 Max 128GB (MPS) — EDA/冒烟/调试/纯上下文 LGBM"
  train: "云 GPU (A100/4090) — 大编码器正式训练"
  note: "复赛镜像须 CUDA 验证"
